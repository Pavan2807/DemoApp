name: Docker-Image-push-deploy

on:
  push:
    branches: [ "master" ]
#  pull_request:
#    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17

    - name : Build jar
      run : ./mvnw clean package

    - name: Login to dockerHub
      run: docker login -u "{{  secrets.DOCKER_USERNAME  }}" --password-stdin

    - name: Build the Docker image
      run: docker build -t {{  secrets.DOCKER_USERNAME  }}/springboot-demo:latest

    - name: Push image
      run: docker push {{  secrets.DOCKER_USERNAME  }}/springboot-demo:latest

    - name: Run the image
      run : docker run -d -p 8080:8080 {{  secrets.DOCKER_USERNAME  }}/springboot-demo:latest
